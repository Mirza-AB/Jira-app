spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/jiraclone}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

server.port=8080

app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:3600000}
app.jwt.refresh-expiration-ms=${JWT_REFRESH_EXPIRATION_MS:86400000}

app.rate-limit.login.requests=${RATE_LIMIT_REQUESTS:5}
app.rate-limit.login.minutes=${RATE_LIMIT_MINUTES:1}
